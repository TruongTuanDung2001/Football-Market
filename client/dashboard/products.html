<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <!-- links -->
    <link rel="stylesheet" href="/client/css/dashboard/products.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--  -->
    <div class="products-page">
      <div class="page-header">
        <div>
          <h2>Products</h2>
          <p>Manage all products in your marketplace.</p>
        </div>

        <button class="btn-add">+ Add Product</button>
      </div>

      <div class="toolbar">
        <input type="text" placeholder="🔍 Search product..." />

        <select>
          <option>All Categories</option>
          <option>Shoes</option>
          <option>Ball</option>
          <option>Shirt</option>
        </select>

        <select>
          <option>All Status</option>
          <option>In Stock</option>
          <option>Low Stock</option>
          <option>Sold Out</option>
        </select>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Sale</th>
              <th>Status</th>
              <th>Create at</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="product-list">
            <!--  -->
            <!-- <tr>
              <td>
                <img class="product-image" src="" />
              </td>

              <td>Nike Football</td>

              <td>Ball</td>

              <td>500.000đ</td>

              <td>20</td>

              <td>
                <span class="status in-stock"> In Stock </span>
              </td>
              <td>03-07-2026</td>
              <td>
                <div class="action">
                  <button class="view">
                    <i class="fa-solid fa-eye"></i>
                  </button>

                  <button class="edit">
                    <i class="fa-solid fa-pen"></i>
                  </button>

                  <button class="delete">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr> -->
          </tbody>
        </table>
      </div>

      <!-- add product -->
      <div class="modal" id="addProductModal">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Add Product</h2>
            <span id="closeModal">&times;</span>
          </div>

          <form id="productForm">
            <input type="text" placeholder="Product Name" id="productName" />

            <select id="category">
              <option>Shoes</option>
              <option>Hat</option>
              <option>Jacket</option>
              <option>Glasses</option>
              <option>Shirt</option>
            </select>

            <input type="number" min="0" placeholder="Quantity" id="quantity" />

            <input type="number" min="0" placeholder="Price" id="price" />

            <input type="number" min="0" placeholder="Sale" id="sale" />

            <input type="file" placeholder="Image URL" id="image" />

            <textarea placeholder="Description" id="description"></textarea>

            <button type="submit" id="btn-submit">Add Product</button>
          </form>
        </div>
      </div>

      <!-- edit product -->
      <!-- Edit Product -->
      <div class="modal" id="editProductModal">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Edit Product</h2>
            <span id="closeEditModal">&times;</span>
          </div>

          <form id="editProductForm">
            <input type="hidden" id="editProductId" />

            <input
              type="text"
              placeholder="Product Name"
              id="editProductName"
            />

            <select id="editCategory">
              <option>Shoes</option>
              <option>Hat</option>
              <option>Jacket</option>
              <option>Glasses</option>
              <option>Shirt</option>
            </select>

            <input
              type="number"
              min="0"
              placeholder="Quantity"
              id="editQuantity"
            />

            <input type="number" min="0" placeholder="Price" id="editPrice" />

            <input type="number" min="0" placeholder="Sale" id="editSale" />

            <div class="image-preview">
              <p>Current Image</p>
              <img
                id="editPreviewImage"
                src=""
                alt="Preview"
              />
            </div>

            <input type="file" id="editImage" />

            <textarea placeholder="Description" id="editDescription"></textarea>

            <button type="submit">Update Product</button>
          </form>
        </div>
      </div>
      <!--  -->
    </div>
  </body>
  <script type="module" src="/client/js/api/api.js"></script>
  <script type="module" src="/client/js/pages/dashboard/products.js"></script>
</html>
