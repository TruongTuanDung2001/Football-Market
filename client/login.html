<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football Market</title>

    <link rel="stylesheet" href="/client/css/login.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h1>
          <i class="fa-solid fa-futbol"></i>
          Football Market
        </h1>

        <p>Buy & Sell Football Products</p>
      </div>

      <div class="right">
        <!-- LOGIN -->
        <form id="loginForm">
          <h2>Login</h2>

          <input type="text" placeholder="Username" class="inputAccountLogin" />

          <input type="password" placeholder="Password" class="inputPasswordLogin" />

          <button id="btn-login">Login</button>

          <p>
            Don't have an account?

            <a id="showRegister"> Register </a>
          </p>
        </form>

        <!-- REGISTER -->

        <form id="registerForm" class="hidden">
          <h2>Create Account</h2>

          <input type="text" placeholder="Full Name" />

          <input type="text" placeholder="Username" />

          <input type="email" placeholder="Email" />

          <input type="text" placeholder="Phone" />

          <input type="password" placeholder="Password" />

          <input type="password" placeholder="Confirm Password" />

          <button>Register</button>

          <p>
            Already have an account?

            <a id="showLogin"> Login </a>
          </p>
        </form>
      </div>
    </div>
  </body>
  <!-- script -->
   <script src="/client/js/pages/login.js"></script>
   <script src="/client/js/api/api.js"></script>
</html>
